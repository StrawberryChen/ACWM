seed: 42
device: cpu

data:
  train_paths: []
  val_paths: []
  history_length: 3
  batch_size: 16
  num_workers: 0

model:
  version: leworld
  latent_dim: 192
  history_size: 3
  agent_encoder:
    name: vit_tiny_gru
    image_channels: 3
    action_dim: 2
    state_dim: 192
    feature_dim: 192
    model_name: null
    patch_size: 14
    projector_hidden_dim: 2048
    pretrained: false
    image_size: 224
    trainable: true
  environment_encoder:
    name: vit_tiny
    image_channels: 3
    state_dim: 192
    model_name: null
    patch_size: 14
    projector_hidden_dim: 2048
    pretrained: false
    image_size: 224
    trainable: true
  agent_transition:
    name: mlp
    agent_dim: 192
    action_dim: 2
    hidden_dim: 384
  environment_transition:
    name: mlp
    environment_dim: 192
    agent_dim: 192
    hidden_dim: 384
  predictor:
    type: adaln

training:
  epochs: 100
  mode: one_step
  optimizer: adamw
  learning_rate: 0.00005
  weight_decay: 0.001
  amp: true
  gradient_clip_norm: 1.0
  rollout_length: 5
  loss_weights:
    agent: 1.0
    environment: 1.0
    agent_sigreg: 0.09
    environment_sigreg: 0.09
    goal: 1.0
  sigreg:
    knots: 17
    num_projections: 1024
  checkpoint: outputs/leworld.pt
  best_checkpoint: outputs/leworld_best.pt
  metrics_file: outputs/leworld_metrics.jsonl

validation:
  prediction_video_interval: 1
  prediction_video_samples: 32
  planning_interval: 10
  planning_episodes: 50
  planning_videos: 3
  video_dir: outputs/videos

wandb:
  enabled: true
  project: acwm
  entity: null
  name: leworld
  mode: online

planner:
  horizon: 5
  action_dim: 2
  action_low: 0.0
  action_high: 512.0
  population: 300
  elites: 30
  iterations: 30

environment:
  env_id: gym_pusht/PushT-v0
  eval_from_dataset: true
  goal_offset_steps: 25
  observation_width: 96
  observation_height: 96
  max_steps: 50
  replan_interval: 5
  success_threshold: 0.95
  seed: 1000
  video_fps: 20
  goal_image: null
  goal_reset_state: [50.0, 50.0, 256.0, 256.0, 0.785398]
