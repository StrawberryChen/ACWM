seed: 42
device: cpu

data:
  train_paths: []
  val_paths: []
  history_length: 3
  batch_size: 16
  num_workers: 0

model:
  version: motion_token
  latent_dim: 192
  history_size: 3
  agent_encoder:
    name: vit_tiny_gru
    image_channels: 3
    action_dim: 2
    state_dim: 192
    feature_dim: 192
    model_name: null
    patch_size: 14
    projector_hidden_dim: 2048
    pretrained: false
    image_size: 224
    trainable: true
  environment_encoder:
    name: vit_tiny
    image_channels: 3
    state_dim: 192
    model_name: null
    patch_size: 14
    projector_hidden_dim: 2048
    pretrained: false
    image_size: 224
    trainable: true
  agent_transition:
    name: mlp
    agent_dim: 192
    action_dim: 2
    hidden_dim: 384
  environment_transition:
    name: mlp
    environment_dim: 192
    agent_dim: 192
    hidden_dim: 384
  predictor:
    # Switch to "adaln" to use the retained baseline transition path.
    type: motion_token
    action_dim: 2
    hidden_dim: 192
    history_size: 3
    motion_layers: 2
    transformer_layers: 2
    num_heads: 3
    dropout: 0.0
    flow_hidden_dim: 384

training:
  epochs: 100
  mode: one_step
  optimizer: adamw
  learning_rate: 0.00005
  weight_decay: 0.001
  amp: true
  gradient_clip_norm: 1.0
  rollout_length: 5
  loss_weights:
    prediction: 1.0
    sigreg: 0.09
    agent: 1.0
    environment: 1.0
    agent_sigreg: 0.09
    environment_sigreg: 0.09
    goal: 1.0
  sigreg:
    knots: 17
    num_projections: 1024
  checkpoint: outputs/acwm.pt
  best_checkpoint: outputs/acwm_best.pt
  metrics_file: outputs/metrics.jsonl

validation:
  prediction_video_interval: 1
  prediction_video_samples: 32
  planning_interval: 50
  planning_episodes: 50
  planning_videos: 3
  video_dir: outputs/videos

wandb:
  enabled: true
  project: acwm
  entity: null
  name: null
  mode: online

planner:
  horizon: 5
  action_dim: 2
  action_low: 0.0
  action_high: 512.0
  population: 300
  elites: 30
  iterations: 30

environment:
  env_id: gym_pusht/PushT-v0
  observation_width: 96
  observation_height: 96
  max_steps: 50
  # Execute this many actions from each CEM result before replanning.
  replan_interval: 5
  success_threshold: 0.95
  seed: 1000
  video_fps: 20
  # Optional exact goal RGB image; when null, goal_reset_state is rendered instead.
  goal_image: null
  # [agent_x, agent_y, block_x, block_y, block_angle] used to render goal latent.
  goal_reset_state: [50.0, 50.0, 256.0, 256.0, 0.785398]
